# Development overrides — automatically merged by `docker compose up`.
# Remove or rename this file in production deployments.
services:
  paperverifier:
    volumes:
      - ./paperverifier:/app/paperverifier
      - ./streamlit_app:/app/streamlit_app
      - ./config:/app/config
    environment:
      - PAPERVERIFIER_LOG_FORMAT=console
      - PAPERVERIFIER_LOG_LEVEL=DEBUG
      # WARNING: Set to 1 ONLY for local development. In production,
      # remove or rename this entire file to avoid disabling authentication.
      - PV_ALLOW_INSECURE_LOCAL=0
      - PV_ENVIRONMENT=local
